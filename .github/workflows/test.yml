name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  calc-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run money-math regression tests
        run: node test/calc.test.js
