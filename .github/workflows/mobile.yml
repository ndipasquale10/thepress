# App Store / Play Store pipeline — validates the mobile web payload.
# Scoped to mobile/** so it never interferes with the web app or test suite.
# Native iOS/Android builds require macOS/Android SDK + signing secrets and
# are documented in mobile/README.md (enable the commented jobs when ready).
name: Mobile build

on:
  push:
    paths: ['mobile/**', '.github/workflows/mobile.yml']
  pull_request:
    paths: ['mobile/**']
  workflow_dispatch:

jobs:
  web-payload:
    name: Assemble & validate web payload
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Assemble mobile/www from the root web app
        run: node scripts/build-web.mjs
      - name: Verify payload
        run: |
          test -f www/index.html || { echo "index.html missing"; exit 1; }
          test -f www/manifest.json || { echo "manifest.json missing"; exit 1; }
          echo "Web payload assembled and verified."

